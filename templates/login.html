{% extends "base.html" %}
{% block title %}Login | MarketPulse Pro{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-panel">
        <h1>MarketPulse Pro</h1>
        <p>Professional crypto intelligence platform</p>
    </div>
    <form class="auth-card" method="post" action="/login">
        <h2>Sign In</h2>
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required>
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>
        <button type="submit" class="btn-primary">Login</button>
        <div class="demo-box">
            <p><strong>Beginner Training Account</strong></p>
            <p>Username: <code>demo</code> | Password: <code>Demo@123</code></p>
            <button type="submit" formnovalidate formaction="/login/demo" formmethod="post" class="btn-outline demo-btn">
                Login With Demo Account
            </button>
        </div>
        <p class="auth-help">New user? <a href="/register">Create account</a></p>
    </form>
</div>
{% endblock %}
